<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ResolviaAI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-image">
            <img src="https://images.unsplash.com/photo-1614064000300-3c22adcb3bd8?auto=format&fit=crop&q=80&w=1200"
                alt="Abstract Technology">
            <div class="auth-image-content">
                <h3>Set a strong password</h3>
                <p>Keep your support infrastructure safe by adhering to standard password constraints.</p>
            </div>
        </div>

        <div class="auth-form-wrapper">
            <div class="auth-form-container animate-fade-in-up">
                <a href="index.html" class="logo">Resolvia<span>AI</span></a>
                <h2>Reset Password</h2>
                <p class="subtitle">Please enter your new strong password.</p>

                <form id="resetForm" onsubmit="return handleResetPassword(event)">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required
                            oninput="checkPasswordStrength(this.value); document.getElementById('matchError').style.display='none';">
                        <div class="password-strength">
                            <div id="strengthBar" class="password-strength-bar"></div>
                        </div>
                        <p id="passwordHint"
                            style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; line-height: 1.4;">
                            Must be at least 8 characters with a mix of letters, numbers & symbols.</p>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required
                            oninput="document.getElementById('matchError').style.display='none';">
                        <div id="matchError" class="error-message">Passwords do not match.</div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                </form>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="script.js"></script>
</body>

</html>
