<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResolviaAI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-image">
            <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=1200"
                alt="AI Technology Illustration">
            <div class="auth-image-content">
                <h3>Smarter resolutions, faster support.</h3>
                <p>Harness the power of AI to automate ticket management while keeping the human touch when it matters
                    most.</p>
            </div>
        </div>

        <div class="auth-form-wrapper">
            <div class="auth-form-container animate-fade-in-up">
                <a href="index.html" class="logo">Resolvia<span>AI</span></a>
                <h2>Welcome back</h2>
                <p class="subtitle">Enter your details to access your account.</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email ID</label>
                        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="auth-links">
                            <span></span>
                            <a href="forgot-password.html">Forgot Password?</a>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Login</button>

                    <div class="text-center mt-4">
                        <span style="color: var(--text-muted); font-size: 0.875rem;">Don't have an account? </span>
                        <a href="register.html" style="font-weight: 600; font-size: 0.875rem;">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="script.js"></script>
</body>

</html>
