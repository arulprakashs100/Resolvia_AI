<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ResolviaAI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-image">
            <img src="https://images.unsplash.com/photo-1633265486064-086b219458ce?auto=format&fit=crop&q=80&w=1200"
                alt="Technology Security">
            <div class="auth-image-content">
                <h3>Secure Account Recovery</h3>
                <p>Verify your identity and get back to managing your tickets seamlessly.</p>
            </div>
        </div>

        <div class="auth-form-wrapper">
            <div class="auth-form-container animate-fade-in-up">
                <a href="index.html" class="logo">Resolvia<span>AI</span></a>
                <h2>Forgot Password</h2>
                <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

                <!-- Redirects to reset-password.html upon submission -->
                <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label for="email">Email ID</label>
                        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Submit</button>

                    <div class="text-center mt-4">
                        <a href="login.html" class="btn btn-secondary btn-block">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="script.js"></script>
</body>

</html>
