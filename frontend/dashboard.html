<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ResolviaAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">
    <!-- Sidebar injected by dashboard.js -->

    <div class="user-main-wrapper">
        <nav class="dashboard-nav">
            <span class="nav-page-title">User Dashboard</span>
            <div class="nav-right">
                <div class="user-profile" title="My Profile">
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <span class="user-name"  id="userNameText">User</span>
                        <span class="user-email" id="userEmailText">user@email.com</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="handleLogout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <main class="dashboard-main">

            <!-- Greeting Banner -->
            <div class="user-greeting">
                <div>
                    <h1 id="greetingText">Welcome back!</h1>
                    <p id="greetingSubText">Loading your tickets...</p>
                </div>
                <div class="greeting-right" id="greetingDate"></div>
            </div>

            <!-- Summary Cards -->
            <section class="summary-container">
                <div class="summary-card active" onclick="filterTickets('all', this)">
                    <h3>Total Tickets</h3>
                    <div class="summary-number" id="count-all">0</div>
                </div>
                <div class="summary-card" onclick="filterTickets('Inprocess', this)">
                    <h3>Unresolved Tickets</h3>
                    <div class="summary-number" id="count-open">0</div>
                </div>
                <div class="summary-card" onclick="filterTickets('Approve', this)">
                    <h3>Resolved Tickets</h3>
                    <div class="summary-number" id="count-resolved">0</div>
                </div>
            </section>

            <!-- Create Ticket CTA -->
            <div class="create-ticket-action">
                <a href="create-ticket.html" class="btn btn-primary btn-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Create a Ticket
                </a>
            </div>

            <!-- Tickets Table -->
            <section class="card ticket-list-card">
                <div class="card-header">
                    <h2 id="table-title">All Tickets</h2>
                </div>
                <div class="table-responsive">
                    <table class="table" id="ticketTable">
                        <thead>
                            <tr>
                                <th>Ticket Number</th>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="ticketTableBody"></tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="common.js"></script>
    <script src="dashboard.js"></script>
    <script>
        const dateEl = document.getElementById("greetingDate");
        if (dateEl) {
            dateEl.textContent = new Date().toLocaleDateString("en-IN", {
                weekday: "long", year: "numeric", month: "long", day: "numeric"
            });
        }
    </script>
</body>
</html>
